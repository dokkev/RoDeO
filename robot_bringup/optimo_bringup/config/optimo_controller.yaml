controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wbc_controller:
      type: optimo_controller/OptimoController

wbc_controller:
  ros__parameters:
    wbc_yaml_path: package://optimo_controller/config/optimo_wbc.yaml
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7

joint_state_broadcaster:
  ros__parameters:
    use_local_topics: true
