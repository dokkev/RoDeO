# ==============================================================================
# 7-DOF Manipulator Physical Parameters for WBC (Strictly SI Units)
# Units: [rad], [rad/s], [Nm], [Nm/rad], [kg], [m], [kg*m^2]
# ==============================================================================

robot_hardware:
  name: "optimo_7dof"
  dof: 7

  # ---------------------------------------------------------
  # 1. Kinematic Limits (위치 및 속도 한계)
  # ---------------------------------------------------------
  # 변환: deg -> rad ( x * pi / 180 )
  pos_limit_lower: [-2.0944,  1.0472, -2.0944, -2.5307, -2.6180, -2.0944, -2.0944] # [rad]
  pos_limit_upper: [ 2.0944,  3.8397,  2.0944,  2.5307,  2.6180,  2.0944,  2.0944] # [rad]
  
  # 변환: deg/s -> rad/s
  vel_limit:       [ 1.7453,  1.7453,  2.6180,  2.6180,  3.1416,  3.1416,  3.1416] # [rad/s]

  # ---------------------------------------------------------
  # 2. Dynamic Limits & SEA Properties (동역학 및 스프링 특성)
  # ---------------------------------------------------------
  # 변환: mNm -> Nm ( x * 0.001 )
  trq_limit:       [ 95.0,    95.0,    40.0,    40.0,    15.0,    15.0,    15.0  ] # [Nm]
  
  # SEA 물리적 강성 (Stiffness)
  # J1~J3 변환: (1 / (Ticks/Nm)) * (65536 / 2*pi) * gear_ratio
  # J4~J7 변환: (mNm/deg * 0.001) * (180 / pi) * gear_ratio
  stiffness:       [ 966.4,   947.6,   509.3,   404.1,   484.3,   479.2,   455.6 ] # [Nm/rad]

  # 피드포워드 마찰 보상 게인 (단위 통일 필요, 펌웨어 설정치 참고용)
  # 펌웨어의 dmp_cmp (점성 마찰) 및 cf (정지 마찰)
  damping_cmp:     [ 0.0010,  0.0015,  0.0001,  0.0040,  0.0015,  0.0015,  0.0015] 
  coulomb_fric:    [ 1.0,     1.2,     1.0,     1.0,     2.0,     2.0,     2.0   ] 

  # ---------------------------------------------------------
  # 3. Inertial Properties (관성 정보 - URDF 덮어쓰기/업데이트용)
  # ---------------------------------------------------------
  mass:            [ 4.14,    1.72,    4.13,    1.09,    1.92,    1.04,    0.88  ] # [kg]