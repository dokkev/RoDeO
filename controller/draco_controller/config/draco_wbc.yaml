# =============================================================
# Draco WBC Configuration
# =============================================================

# [ WBIC (Whole-Body Impulse Control) Formulation ]
# Decision Variables (x): [ delta_qddot, delta_rf ]^T  (+ slack variables when soft constraints enabled)
#
# Draco3: 25-DOF floating-base humanoid (single-knee model)
# - 6 virtual floating-base DOFs + 25 actuated DOFs
# - Dual foot surface contacts (6D each)
# - CoM task for balance + joint posture task for null-space

# 1. Robot model (URDF)
robot_model:
  urdf_path: "package://draco_description/urdf/draco_modified_single_knee.urdf"

  is_floating_base: true    # Draco is a floating-base humanoid

  base_frame: "torso_link"  # floating-base reference frame

# 2. Feedforward Controller (WBC) Settings
controller:
  enable_gravity_compensation:  true   # WBIC already accounts for full rigid-body dynamics
  enable_coriolis_compensation: false
  enable_inertia_compensation:  false

  joint_pid:
    enabled: false
    gains_yaml: "draco_joint_pd.yaml"

# 3. QP Regularization weights
regularization:
  w_qddot: 1.0e-6              # delta_qddot tracking (IK solution preservation)
  w_rf: 1.0e-4                 # delta_rf tracking (contact force correction)
  w_tau: 1.0e-3                # torque minimization
  w_tau_dot: 0.0               # torque rate of change smoothing
  w_xc_ddot: 1.0e-3            # contact acceleration minimization
  w_f_dot: 1.0e-3              # reaction force rate smoothing

# 4. Global constraints
# Each constraint can be toggled between hard (boxq constraint) and soft (slack variable + penalty).
#   is_soft: false (default) -> hard QP box constraint (strict enforcement)
#   is_soft: true            -> slack variable with quadratic penalty (controlled violation)
#   soft_weight: 1.0e+5      -> penalty weight when is_soft=true (higher = stricter)
  JointPosLimitConstraint:
    enabled: true
    scale: 1.0        # fraction of URDF position range
    is_soft: true
    soft_weight: 1.0e+5

  JointVelLimitConstraint:
    enabled: true
    scale: 1.0        # fraction of URDF velocity limits
    is_soft: true
    soft_weight: 1.0e+5

  JointTrqLimitConstraint:
    enabled: true
    scale: 1.0        # fraction of URDF torque limits
    is_soft: false      # soft -> full coupled dynamics (Sa*M) in C matrix
    soft_weight: 1.0e+5

# 5. Task pool
task_pool_yaml: "task_list.yaml"

# 6. State machine
state_machine_yaml: "state_machine.yaml"
