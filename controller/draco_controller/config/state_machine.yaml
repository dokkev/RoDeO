# =============================================================
# Draco State Machine
# =============================================================
#
# State transitions:
#   0: draco_initialize -> 1: draco_balance (auto after 1.5s)
#   1: draco_balance    -> stay (or trigger state 2 externally)
#   2: hand_reaching    -> stay (triggered via RequestState)

state_machine:
  - id: 0
    name: "draco_initialize"
    params:
      duration: 1.5
      wait_time: 0.1
      next_state_id: 1
    task_hierarchy:
      - name: "com_task"
        priority: 0
      - name: "jpos_task"
        priority: 1
    contact_constraints:
      - name: "lfoot_contact"
      - name: "rfoot_contact"
    force_tasks:
      - name: "lfoot_force"
      - name: "rfoot_force"

  - id: 1
    name: "draco_balance"
    params:
      duration: 1.0
      wait_time: 0.0
      b_stay_here: true
    task_hierarchy:
      - name: "com_task"
        priority: 0
      - name: "jpos_task"
        priority: 1
    contact_constraints:
      - name: "lfoot_contact"
      - name: "rfoot_contact"
    force_tasks:
      - name: "lfoot_force"
      - name: "rfoot_force"

  # State 2: right-hand reaching while maintaining balance.
  # Triggered externally via RequestState(2) after balance is established.
  - id: 2
    name: "hand_reaching"
    type: "draco_balance"
    params:
      b_stay_here: true
    task_hierarchy:
      - name: "com_task"
        priority: 0
      - name: "r_hand_pos_task"
        priority: 1
        weight: [50, 50, 50]
      - name: "r_hand_ori_task"
        priority: 2
        weight: [10, 10, 10]
      - name: "jpos_task"
        priority: 3
    contact_constraints:
      - name: "lfoot_contact"
      - name: "rfoot_contact"
    force_tasks:
      - name: "lfoot_force"
      - name: "rfoot_force"
