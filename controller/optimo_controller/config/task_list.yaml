# =============================================================
# Optimo Task Pool
# =============================================================
# Scalar values are broadcast to all DOFs automatically.
# Pool weights serve as the default when a state doesn't override them.
task_pool:
  - name: "jpos_task"
    type: "JointTask"
    kp: 100.0
    kd: 20.0
    kp_ik: 1.0
    weight: 100.0

  - name: "ee_pos_task"
    type: "LinkPosTask"
    target_frame: "end_effector"
    reference_frame: "base_link"
    kp: 1600.0
    kd: 80.0
    kp_ik: 1.0
    weight: 100.0

  - name: "ee_ori_task"
    type: "LinkOriTask"
    target_frame: "end_effector"
    reference_frame: "base_link"
    kp: 1600.0
    kd: 80.0
    kp_ik: 1.0
    weight: 100.0
