# =============================================================
# Residual Dynamics Compensators
# =============================================================
#
# These modules compensate for unmodeled dynamics that the URDF/Pinocchio
# model cannot capture: joint friction, damping, cable routing forces,
# mass/inertia errors, unknown payloads, etc.
#
# They add feedforward torque corrections BETWEEN the WBIC solver output
# and the joint PID feedback:
#
#   tau = tau_wbic + tau_friction + tau_disturbance + tau_pid
#
# Both modules are RT-safe (no heap allocation after setup).

residual_dynamics:

  # ── Momentum-based Lumped Uncertainty Observer (De Luca 2003) ──────────
  #
  # Estimates lumped unmodeled dynamics from the generalized momentum residual:
  #
  #   p    = M(q)*qdot                        (nominal momentum, caller-computed)
  #   beta = C(q,qdot)*qdot - g(q)            (nominal momentum rate bias)
  #   ŵ   = K_o * (p - z)                    (lumped uncertainty estimate)
  #   z   += (tau + beta + ŵ) * dt            (observer state)
  #
  # Captures friction, damping, mass mismatch, and unknown payloads.
  # For compensation, prefer injecting only tau_bias (slow model error),
  # not the full ŵ which also includes contact transients.
  #
  # Tuning:
  #   K_o = 30:           recommended default
  #   K_o < 20:           slow convergence
  #   K_o > 100:          noise amplification risk
  #   max_tau_uncertainty: safety clamp [Nm] — prevents runaway compensation
  #   momentum_lpf_hz:    optional low-pass on p_nom to reduce velocity noise
  #   bias_lpf_hz:        optional slow/fast residual splitter
  #
  # Supports scalar (broadcast to all joints) or per-joint vector.
  momentum_observer:
    enabled: false  # Can blow up under extreme model mismatch (>50% mass error + payload)
    K_o: 30.0
    max_tau_uncertainty: 20.0
    # momentum_lpf_hz: 10.0   # optional: low-pass nominal momentum
    # bias_lpf_hz: 0.5        # optional: extract slow model-bias component

  # ── Adaptive Friction Compensator ───────────────────────────────
  #
  # Online estimation of Coulomb + viscous friction via gradient descent:
  #
  #   tau_fric = f_c * sign(qdot) + f_v * qdot
  #   f_c += gamma_c * velocity_error * sign(qdot) * dt
  #   f_v += gamma_v * velocity_error * qdot * dt
  #
  # In practice, the momentum observer dominates for short tasks.
  # The friction compensator may help on real hardware where friction
  # varies over time (thermal drift, wear) and you want online adaptation.
  #
  # Tuning:
  #   gamma_c/gamma_v: adaptation learning rates (higher = faster but noisier)
  #   max_f_c/max_f_v: projection clamps to prevent parameter drift
  friction_compensator:
    enabled: false
    gamma_c: 5.0
    gamma_v: 2.0
    max_f_c: 10.0
    max_f_v: 5.0
